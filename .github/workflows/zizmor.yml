name: Zizmor workflows audit
on:
  push:
    branches:
      - master
    paths:
      - '.github/workflows/**'
  pull_request:
    paths:
      - '.github/workflows/**'

permissions: {}

jobs:
  zizmor:
    name: Zizmor scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write   # upload SARIF
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # 7.0.0
        with:
          persist-credentials: false

      - name: Install zizmor
        run: pipx install zizmor

      - name: Scan workflows
        run: zizmor --format=sarif --offline .github/workflows/ > results.sarif
        continue-on-error: true

      - name: Upload SARIF results
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # 4.36.2
        with:
          sarif_file: results.sarif
          category: zizmor
